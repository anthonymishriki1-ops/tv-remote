<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Remote</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- Pairing Screen -->
  <div id="pair-screen" class="container">
    <h1 class="title">TV Remote</h1>
    <p class="subtitle">Connect your devices</p>

    <div class="pair-actions">
      <button id="create-room-btn" class="pair-btn primary">Create Room</button>
      <button id="join-room-btn" class="pair-btn secondary">Join Room</button>
    </div>

    <!-- Create Room result -->
    <div id="create-result" class="pair-result hidden">
      <p>Your room PIN:</p>
      <div id="pin-display" class="pin-display"></div>
      <p class="pin-hint">Share this PIN with other devices</p>
    </div>

    <!-- Join Room form -->
    <div id="join-form" class="pair-form hidden">
      <input type="text" id="pin-input" placeholder="Enter 6-digit PIN" maxlength="6" autocomplete="off">
      <button id="join-btn" class="pair-btn primary">Connect</button>
      <p id="join-error" class="error-msg hidden"></p>
    </div>
  </div>

  <!-- Main Remote Screen -->
  <div id="remote-screen" class="container hidden">
    <div class="header">
      <h1 class="title">TV Remote</h1>
      <div class="header-right">
        <span id="room-pin-label" class="room-label"></span>
        <button id="unpair-btn" class="unpair-btn">Unpair</button>
      </div>
    </div>

    <div class="add-form">
      <input type="text" id="channel-name" placeholder="Channel Name" autocomplete="off">
      <input type="url" id="channel-link" placeholder="https://..." autocomplete="off">
      <button id="add-btn">+ Add</button>
    </div>

    <div id="channels" class="channels-grid"></div>

    <p id="empty-msg" class="empty-msg">No channels yet. Add one above!</p>

    <div class="remote-controls">
      <button class="control-btn" id="vol-down">Vol -</button>
      <button class="control-btn" id="mute-btn">Mute</button>
      <button class="control-btn" id="vol-up">Vol +</button>
      <button class="control-btn" id="play-pause-btn">Play/Pause</button>
      <button class="control-btn" id="fullscreen-btn">Fullscreen</button>
    </div>
  </div>

  <!-- Firebase SDK (compat for simpler CDN usage) -->
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="app.js"></script>
</body>
</html>
